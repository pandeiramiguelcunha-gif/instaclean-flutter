<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InstaClean - Preview</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .phone-frame {
            width: 375px;
            height: 780px;
            background: #000;
            border-radius: 45px;
            padding: 12px;
            box-shadow: 0 25px 60px rgba(0,230,118,0.15), 0 0 0 2px #333;
        }
        
        .phone-screen {
            width: 100%;
            height: 100%;
            background: #121212;
            border-radius: 36px;
            overflow: hidden;
            position: relative;
        }
        
        .screen { display: none; height: 100%; flex-direction: column; }
        .screen.active { display: flex; }
        
        /* App Bar */
        .app-bar {
            padding: 50px 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .app-bar h1 { color: #fff; font-size: 22px; font-weight: bold; flex: 1; text-align: center; }
        .app-bar .back-btn { color: #fff; font-size: 18px; cursor: pointer; width: 40px; }
        .app-bar .settings-btn { color: rgba(255,255,255,0.7); font-size: 20px; cursor: pointer; width: 40px; text-align: right; }
        
        /* Dashboard */
        .dashboard-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .gauge-container { position: relative; width: 250px; height: 250px; margin: 20px 0; }
        
        .gauge-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 135deg, #2D2D2D 0deg, #2D2D2D 270deg, transparent 270deg);
        }
        
        .gauge-progress {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 135deg, #00E676 0deg, #00BCD4 135deg, #2196F3 180deg, transparent 180deg);
            transition: all 1.5s ease-out;
        }
        
        .gauge-inner {
            position: absolute;
            top: 25px; left: 25px; right: 25px; bottom: 25px;
            background: #1A1A1A;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .gauge-percent { color: #fff; font-size: 48px; font-weight: bold; }
        .gauge-details { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 4px; }
        .gauge-label { color: rgba(255,255,255,0.7); font-size: 16px; margin-top: 16px; }
        
        /* Botão principal */
        .main-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #00E676, #00BCD4);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 25px rgba(0,230,118,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .main-btn:hover { transform: scale(1.02); box-shadow: 0 12px 35px rgba(0,230,118,0.5); }
        .main-btn:active { transform: scale(0.98); }
        .main-btn.loading { background: linear-gradient(90deg, #555, #444); box-shadow: none; pointer-events: none; }
        
        /* Results Screen */
        .results-content { flex: 1; padding: 20px; overflow-y: auto; }
        
        .summary-card {
            background: #1E1E1E;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(0,230,118,0.3);
            margin-bottom: 20px;
        }
        .summary-card h2 { color: #fff; font-size: 24px; margin-bottom: 8px; }
        .summary-card p { color: #00E676; font-size: 16px; }
        
        .categories-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .category-card {
            background: #1E1E1E;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .category-card:hover { transform: translateY(-2px); }
        .category-card.blue { border-color: rgba(33,150,243,0.3); }
        .category-card.purple { border-color: rgba(156,39,176,0.3); }
        .category-card.orange { border-color: rgba(255,152,0,0.3); }
        .category-card.green { border-color: rgba(76,175,80,0.3); }
        .category-card.empty { background: #1A1A1A; border-color: #333; pointer-events: none; }
        
        .category-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 26px;
        }
        .category-icon.blue { background: rgba(33,150,243,0.2); color: #2196F3; }
        .category-icon.purple { background: rgba(156,39,176,0.2); color: #9C27B0; }
        .category-icon.orange { background: rgba(255,152,0,0.2); color: #FF9800; }
        .category-icon.green { background: rgba(76,175,80,0.2); color: #4CAF50; }
        .category-icon.empty { background: #333; color: #666; }
        
        .category-title { color: #fff; font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .category-count { font-size: 16px; font-weight: bold; }
        .category-count.blue { color: #2196F3; }
        .category-count.purple { color: #9C27B0; }
        .category-count.orange { color: #FF9800; }
        .category-count.green { color: #4CAF50; }
        .category-count.empty { color: #666; }
        .category-size { color: rgba(255,255,255,0.5); font-size: 12px; }
        
        /* Toast */
        .toast {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: #2D2D2D;
            color: #fff;
            padding: 16px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 100;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast i { color: #00E676; }
        
        .preview-label {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #00E676, #00BCD4);
            color: #000;
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,230,118,0.3);
        }
        
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="preview-label">📱 Preview InstaClean - Tema Escuro</div>
    
    <div class="phone-frame">
        <div class="phone-screen">
            
            <!-- Dashboard Screen -->
            <div class="screen active" id="dashboardScreen">
                <div class="app-bar">
                    <div class="back-btn"></div>
                    <h1>InstaClean</h1>
                    <div class="settings-btn"><i class="fas fa-cog"></i></div>
                </div>
                
                <div class="dashboard-content">
                    <div class="gauge-container">
                        <div class="gauge-bg"></div>
                        <div class="gauge-progress" id="gaugeProgress"></div>
                        <div class="gauge-inner">
                            <div class="gauge-percent" id="gaugePercent">0%</div>
                            <div class="gauge-details">86.4 GB de 128 GB</div>
                        </div>
                    </div>
                    <div class="gauge-label">Espaço Utilizado</div>
                    
                    <button class="main-btn" id="analyzeBtn" onclick="startAnalysis()">
                        <i class="fas fa-search"></i>
                        Analisar Agora
                    </button>
                </div>
                
                <div class="toast" id="toast"></div>
            </div>
            
            <!-- Results Screen -->
            <div class="screen" id="resultsScreen">
                <div class="app-bar">
                    <div class="back-btn" onclick="goBack()"><i class="fas fa-chevron-left"></i></div>
                    <h1>Resultados</h1>
                    <div class="settings-btn"></div>
                </div>
                
                <div class="results-content">
                    <div class="summary-card">
                        <h2 id="totalItems">223 itens encontrados</h2>
                        <p id="potentialSavings">Pode libertar 2.4 GB</p>
                    </div>
                    
                    <div class="categories-grid">
                        <div class="category-card blue" id="photosCard" onclick="cleanCategory('photos')">
                            <div class="category-icon blue"><i class="fas fa-images"></i></div>
                            <div class="category-title">Fotos Duplicadas</div>
                            <div class="category-count blue" id="photosCount">47 itens</div>
                            <div class="category-size">850 MB</div>
                        </div>
                        
                        <div class="category-card purple" id="screenshotsCard" onclick="cleanCategory('screenshots')">
                            <div class="category-icon purple"><i class="fas fa-mobile-alt"></i></div>
                            <div class="category-title">Screenshots</div>
                            <div class="category-count purple" id="screenshotsCount">123 itens</div>
                            <div class="category-size">620 MB</div>
                        </div>
                        
                        <div class="category-card orange" id="videosCard" onclick="cleanCategory('videos')">
                            <div class="category-icon orange"><i class="fas fa-video"></i></div>
                            <div class="category-title">Vídeos</div>
                            <div class="category-count orange" id="videosCount">18 itens</div>
                            <div class="category-size">980 MB</div>
                        </div>
                        
                        <div class="category-card green" id="contactsCard" onclick="cleanCategory('contacts')">
                            <div class="category-icon green"><i class="fas fa-users"></i></div>
                            <div class="category-title">Contactos</div>
                            <div class="category-count green" id="contactsCount">35 itens</div>
                            <div class="category-size">12 MB</div>
                        </div>
                    </div>
                </div>
                
                <div style="padding: 20px;">
                    <button class="main-btn" id="cleanAllBtn" onclick="cleanAll()">
                        <i class="fas fa-broom"></i>
                        Limpar Tudo
                    </button>
                </div>
                
                <div class="toast" id="resultsToast"></div>
            </div>
            
        </div>
    </div>
    
    <script>
        // Estado da aplicação
        let state = {
            photos: { count: 47, size: 850 },
            screenshots: { count: 123, size: 620 },
            videos: { count: 18, size: 980 },
            contacts: { count: 35, size: 12 }
        };
        
        // Animação do gauge
        setTimeout(() => {
            document.getElementById('gaugeProgress').style.background = 
                'conic-gradient(from 135deg, #00E676 0deg, #00BCD4 90deg, #2196F3 180deg, transparent 180deg)';
            animatePercent(0, 67.5);
        }, 500);
        
        function animatePercent(from, to) {
            let current = from;
            const interval = setInterval(() => {
                current += 1;
                if (current >= to) {
                    current = to;
                    clearInterval(interval);
                }
                document.getElementById('gaugePercent').textContent = current.toFixed(1) + '%';
            }, 20);
        }
        
        function startAnalysis() {
            const btn = document.getElementById('analyzeBtn');
            btn.classList.add('loading');
            btn.innerHTML = '<i class="fas fa-spinner spinner"></i> A Analisar...';
            
            setTimeout(() => {
                btn.classList.remove('loading');
                btn.innerHTML = '<i class="fas fa-search"></i> Analisar Agora';
                document.getElementById('dashboardScreen').classList.remove('active');
                document.getElementById('resultsScreen').classList.add('active');
                updateResultsUI();
            }, 2500);
        }
        
        function goBack() {
            document.getElementById('resultsScreen').classList.remove('active');
            document.getElementById('dashboardScreen').classList.add('active');
        }
        
        function cleanCategory(category) {
            const card = document.getElementById(category + 'Card');
            if (card.classList.contains('empty')) return;
            
            const sizeCleaned = state[category].size;
            state[category].count = 0;
            state[category].size = 0;
            
            updateResultsUI();
            showResultsToast(`Limpeza concluída! ${sizeCleaned} MB libertados`);
        }
        
        function cleanAll() {
            const btn = document.getElementById('cleanAllBtn');
            btn.classList.add('loading');
            btn.innerHTML = '<i class="fas fa-spinner spinner"></i> A Limpar...';
            
            let totalSize = 0;
            for (let cat in state) {
                totalSize += state[cat].size;
                state[cat].count = 0;
                state[cat].size = 0;
            }
            
            setTimeout(() => {
                btn.classList.remove('loading');
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Tudo Limpo!';
                updateResultsUI();
                showResultsToast(`Limpeza total! ${totalSize} MB libertados`);
            }, 2000);
        }
        
        function updateResultsUI() {
            // Atualizar contadores
            updateCard('photos', 'blue');
            updateCard('screenshots', 'purple');
            updateCard('videos', 'orange');
            updateCard('contacts', 'green');
            
            // Atualizar resumo
            let totalItems = 0;
            let totalSize = 0;
            for (let cat in state) {
                totalItems += state[cat].count;
                totalSize += state[cat].size;
            }
            
            document.getElementById('totalItems').textContent = 
                totalItems === 0 ? 'Tudo limpo!' : totalItems + ' itens encontrados';
            document.getElementById('potentialSavings').textContent = 
                totalItems === 0 ? 'Memória optimizada' : 'Pode libertar ' + (totalSize / 1024).toFixed(1) + ' GB';
        }
        
        function updateCard(category, colorClass) {
            const card = document.getElementById(category + 'Card');
            const count = document.getElementById(category + 'Count');
            const icon = card.querySelector('.category-icon');
            
            if (state[category].count === 0) {
                card.className = 'category-card empty';
                icon.className = 'category-icon empty';
                icon.innerHTML = '<i class="fas fa-check-circle"></i>';
                count.textContent = 'Limpo';
                count.className = 'category-count empty';
            }
        }
        
        function showResultsToast(message) {
            const toast = document.getElementById('resultsToast');
            toast.innerHTML = '<i class="fas fa-check-circle"></i> ' + message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
