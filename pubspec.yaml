name: instaclean_pmc
description: InstaClean PMC - Limpeza Inteligente de Ficheiros
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Permissões e acesso a ficheiros
  permission_handler: ^11.3.0
  photo_manager: ^3.0.0
  path_provider: ^2.1.2
  device_info_plus: ^9.1.1
  
  # Utilitários
  crypto: ^3.0.3
  path: ^1.9.0
  
  # Monetização
  google_mobile_ads: ^4.0.0
  
  # Firebase
  firebase_core: ^3.8.1
  firebase_analytics: ^11.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
