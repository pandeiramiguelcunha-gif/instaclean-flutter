workflows:
  default-workflow:
    name: Build InstaClean PMC
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Instalar dependencias
        script: |
          flutter pub get
          
      - name: Gerar icones do app
        script: |
          dart run flutter_launcher_icons

      - name: Configurar keystore
        script: |
          if [ -n "$CM_KEYSTORE_PATH" ]; then
            echo "Keystore configurado: $CM_KEYSTORE_PATH"
          else
            echo "AVISO: Keystore não configurado. Build será assinado com debug key."
          fi
          
      - name: Build App Bundle (AAB) para Play Store
        script: |
          flutter build appbundle --release --no-tree-shake-icons
          
      - name: Build APK para testes
        script: |
          flutter build apk --release --no-tree-shake-icons
          
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
