workflows:
  instaclean-workflow:
    name: Reset Total e Build InstaClean
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Criar Estrutura Flutter Completa
        script: | 
          flutter create . --platforms android --org com.instaclean
      - name: Limpeza de Cache e Instalar Dependências
        script: | 
          flutter clean
          flutter pub get
      - name: Gerar APK Final
        script: | 
          flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
